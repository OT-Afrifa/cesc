[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "cesc"
version = "1.0.0"
description = "Identification of Convection Embedded within or Emergent from Stratiform Clouds (CESC) in cold-season orographic precipitation"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "Francis Osei Tutu Afrifa", email = "fafrifa@uwyo.edu" },
    { name = "Bart Geerts", email = "geerts@uwyo.edu" },
]
keywords = [
    "atmospheric-science",
    "orographic-precipitation",
    "convection",
    "WRF",
    "SNOWIE",
    "embedded-convection",
    "cold-season",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Atmospheric Science",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
requires-python = ">=3.9"
dependencies = [
    "numpy>=1.24",
    "xarray>=2023.1",
    "pandas>=2.0",
    "scipy>=1.10",
    "scikit-image>=0.20",
    "numba>=0.57",
    "netCDF4>=1.6",
    "cartopy>=0.21",
    "matplotlib>=3.7",
    "wrf-python>=1.3.4",
    "pyproj>=3.5",
    "geopandas>=0.13",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1",
]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme>=1.3",
    "nbsphinx>=0.9",
]

[project.urls]
Homepage = "https://github.com/OT-Afrifa/cesc"
Repository = "https://github.com/OT-Afrifa/cesc"
Issues = "https://github.com/OT-Afrifa/cesc/issues"
Documentation = "https://cesc.readthedocs.io"

[project.scripts]
run-cesc = "cesc.scripts.run_cesc:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["cesc*"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 100
select = ["E", "F", "W"]
ignore = ["E501"]
